
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  #gw{position:relative;width:100%;max-width:680px;margin:0 auto;user-select:none;-webkit-user-select:none;}
  #gc{display:block;width:100%;background:#000;border-radius:8px;cursor:none;}
  #ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;font-family:'Share Tech Mono',monospace;}
  .hud{position:absolute;top:14px;color:#fff;font-size:13px;letter-spacing:1px;}
  #score-el{left:16px;}
  #lives-el{right:16px;text-align:right;}
  #wave-el{left:50%;transform:translateX(-50%);text-align:center;}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);border-radius:8px;font-family:'Orbitron',monospace;}
  #overlay h1{font-size:clamp(22px,5vw,42px);font-weight:900;letter-spacing:4px;margin:0 0 8px;background:linear-gradient(135deg,#ff2d78,#ff9f1c,#2dffcf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #overlay p{color:#aaa;font-size:13px;margin:4px 0;letter-spacing:1px;}
  #overlay .big{color:#fff;font-size:clamp(28px,4vw,48px);font-weight:700;margin:12px 0;}
  #start-btn{margin-top:20px;padding:12px 36px;background:linear-gradient(90deg,#ff2d78,#ff9f1c);border:none;border-radius:4px;color:#000;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;pointer-events:all;transition:transform .1s;}
  #start-btn:hover{transform:scale(1.05);}
  #controls-hint{position:absolute;bottom:12px;width:100%;text-align:center;color:#555;font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;pointer-events:none;}
  #combo-el{position:absolute;top:44px;left:50%;transform:translateX(-50%);color:#ff9f1c;font-size:12px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:2px;opacity:0;transition:opacity .3s;}
  #wave-announce{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#2dffcf;font-family:'Orbitron',monospace;font-size:clamp(18px,3vw,28px);font-weight:900;letter-spacing:4px;pointer-events:none;opacity:0;transition:opacity .5s;}
</style>
<h2 class="sr-only">NEON VOID — a bullet dodge arcade game. Move your ship to dodge enemies and projectiles. Click to start.</h2>
<div id="gw">
  <canvas id="gc"></canvas>
  <div id="ui">
    <div class="hud" id="score-el">SCORE 0</div>
    <div class="hud" id="wave-el">WAVE 1</div>
    <div class="hud" id="lives-el">♥ ♥ ♥</div>
    <div id="combo-el">COMBO x1</div>
    <div id="wave-announce"></div>
  </div>
  <div id="overlay">
    <h1>NEON VOID</h1>
    <p style="color:#555">── SURVIVE THE SWARM ──</p>
    <p style="color:#666;font-size:11px;margin-top:12px">MOUSE / TOUCH to move your ship</p>
    <p style="color:#666;font-size:11px">Auto-fires · Dodge everything · Survive</p>
    <button id="start-btn">LAUNCH</button>
  </div>
  <div id="controls-hint">MOUSE OR TOUCH TO STEER · AUTO-FIRE ACTIVE</div>
</div>
<script>
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const gw_el=document.getElementById('gw');
const overlay=document.getElementById('overlay');
const scoreEl=document.getElementById('score-el');
const livesEl=document.getElementById('lives-el');
const waveEl=document.getElementById('wave-el');
const comboEl=document.getElementById('combo-el');
const waveAnnEl=document.getElementById('wave-announce');

let W,H,scale;
function resize(){
  W=canvas.offsetWidth;H=Math.round(W*0.72);
  canvas.width=W;canvas.height=H;scale=W/680;
}
resize();
window.addEventListener('resize',resize);

const S={
  IDLE:0,PLAYING:1,DEAD:2,WIN:3
};
let state=S.IDLE;

let player,bullets,enemies,particles,score,lives,combo,comboTimer,wave,waveTimer,bossActive,boss,shootTimer,enemyBullets;

function initGame(){
  player={x:W/2,y:H*0.82,r:10*scale,vx:0,vy:0,invincible:0,flash:0};
  bullets=[];enemies=[];particles=[];enemyBullets=[];
  score=0;lives=3;combo=1;comboTimer=0;wave=0;waveTimer=0;bossActive=false;boss=null;shootTimer=0;
  spawnWave();
}

const COLORS=['#ff2d78','#ff9f1c','#2dffcf','#a78bfa','#60d9ff','#fff544'];

function spawnWave(){
  wave++;
  waveEl.textContent='WAVE '+wave;
  announceWave('WAVE '+wave);
  enemies=[];bossActive=false;boss=null;
  let count=4+wave*2;
  let types=['zigzag','straight','circular','diagonal','sine'];
  for(let i=0;i<count;i++){
    let t=types[Math.floor(Math.random()*Math.min(wave,types.length))];
    let col=COLORS[Math.floor(Math.random()*COLORS.length)];
    enemies.push({
      x:60*scale+(Math.random()*(W-120*scale)),
      y:-30*scale-i*40*scale,
      r:12*scale,
      hp:1+(wave>3?1:0)+(wave>6?1:0),
      maxHp:1+(wave>3?1:0)+(wave>6?1:0),
      speed:(1.2+wave*0.2)*scale,
      type:t,
      t:Math.random()*100,
      color:col,
      shootCd:0,
      shootRate:Math.max(90-wave*8,30),
      dead:false
    });
  }
  if(wave%3===0&&wave>0){spawnBoss();}
}

function spawnBoss(){
  bossActive=true;
  boss={
    x:W/2,y:80*scale,r:32*scale,
    hp:8+wave*3,maxHp:8+wave*3,
    speed:1.2*scale,vx:1.2*scale,vy:0,
    phase:0,t:0,
    color:'#ff2d78',dead:false,
    shootCd:0,shootRate:40
  };
}

function announceWave(txt){
  waveAnnEl.textContent=txt;
  waveAnnEl.style.opacity='1';
  setTimeout(()=>{waveAnnEl.style.opacity='0';},1200);
}

let mx=0,my=0,targetX=null,targetY=null;
canvas.addEventListener('mousemove',e=>{
  let r=canvas.getBoundingClientRect();
  targetX=e.clientX-r.left;targetY=e.clientY-r.top;
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  let r=canvas.getBoundingClientRect();
  targetX=e.touches[0].clientX-r.left;
  targetY=e.touches[0].clientY-r.top;
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  let r=canvas.getBoundingClientRect();
  targetX=e.touches[0].clientX-r.left;
  targetY=e.touches[0].clientY-r.top;
},{passive:true});

document.getElementById('start-btn').addEventListener('click',startGame);
function startGame(){
  overlay.style.display='none';
  state=S.PLAYING;
  initGame();
  requestAnimationFrame(loop);
}

function spawnParticles(x,y,col,n=8){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col,r:2+Math.random()*3});
  }
}

function shoot(){
  bullets.push({x:player.x,y:player.y-player.r,vy:-9*scale,r:4*scale,color:'#2dffcf'});
  if(combo>=3)bullets.push({x:player.x-10*scale,y:player.y-player.r,vy:-9*scale,vx:-0.5*scale,r:3*scale,color:'#60d9ff'});
  if(combo>=5)bullets.push({x:player.x+10*scale,y:player.y-player.r,vy:-9*scale,vx:0.5*scale,r:3*scale,color:'#60d9ff'});
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

let lastTime=0;
function loop(ts){
  if(state!==S.PLAYING)return;
  let dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

function update(dt){
  // player movement
  if(targetX!==null){
    let dx=targetX-player.x,dy=targetY-player.y;
    player.vx+=(dx*0.18-player.vx)*0.4;
    player.vy+=(dy*0.18-player.vy)*0.4;
  }
  player.x+=player.vx*dt;player.y+=player.vy*dt;
  player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y));
  if(player.invincible>0)player.invincible-=dt;
  if(player.flash>0)player.flash-=dt;

  // shoot
  shootTimer-=dt;
  if(shootTimer<=0){shoot();shootTimer=8;}

  // combo
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){combo=1;comboEl.style.opacity='0';}}

  // player bullets
  for(let b of bullets){b.x+=b.vx||0;b.y+=b.vy*dt;}
  bullets=bullets.filter(b=>b.y>-10);

  // enemies
  for(let e of enemies){
    if(e.dead)continue;
    e.t+=0.04*dt;
    if(e.type==='straight'){e.y+=e.speed*dt;}
    else if(e.type==='zigzag'){e.y+=e.speed*dt;e.x+=Math.sin(e.t*2)*2*scale*dt;}
    else if(e.type==='sine'){e.y+=e.speed*0.7*dt;e.x+=Math.cos(e.t)*3*scale*dt;}
    else if(e.type==='diagonal'){e.y+=e.speed*dt;e.x+=e.speed*0.5*(e.side||1)*dt;}
    else if(e.type==='circular'){e.y+=e.speed*0.5*dt;e.x+=Math.sin(e.t*3)*4*scale*dt;}
    if(!e.side)e.side=(Math.random()>0.5?1:-1);

    // enemy shoot
    e.shootCd-=dt;
    if(e.shootCd<=0&&e.y>0&&e.y<H*0.7){
      e.shootCd=e.shootRate;
      let ang=Math.atan2(player.y-e.y,player.x-e.x);
      enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(ang)*3*scale,vy:Math.sin(ang)*3*scale,r:4*scale,col:e.color,life:1});
    }

    // hit by player bullet
    for(let b of bullets){
      if(dist(b,e)<e.r+b.r){b.y=-999;e.hp--;spawnParticles(b.x,b.y,e.color,5);
        if(e.hp<=0){e.dead=true;score+=10*combo;combo=Math.min(combo+1,10);comboTimer=120;
          comboEl.textContent='COMBO x'+combo;comboEl.style.opacity='1';
          spawnParticles(e.x,e.y,e.color,14);scoreEl.textContent='SCORE '+score;}
      }
    }

    // hit player
    if(player.invincible<=0&&dist(player,e)<player.r+e.r-4*scale){
      hitPlayer();e.dead=true;spawnParticles(e.x,e.y,e.color,10);
    }
    if(e.y>H+20)e.dead=true;
  }
  enemies=enemies.filter(e=>!e.dead);

  // enemy bullets
  for(let b of enemyBullets){b.x+=b.vx*dt;b.y+=b.vy*dt;}
  enemyBullets=enemyBullets.filter(b=>b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);

  for(let b of enemyBullets){
    if(player.invincible<=0&&dist(player,b)<player.r+b.r-2*scale){
      hitPlayer();b.life=0;spawnParticles(b.x,b.y,b.col,6);
    }
  }
  enemyBullets=enemyBullets.filter(b=>b.life>0);

  // boss
  if(bossActive&&boss&&!boss.dead){
    boss.t+=0.02*dt;
    boss.x+=boss.vx*dt;
    if(boss.x<boss.r||boss.x>W-boss.r)boss.vx*=-1;
    boss.y=80*scale+Math.sin(boss.t)*20*scale;

    boss.shootCd-=dt;
    if(boss.shootCd<=0){
      boss.shootCd=boss.shootRate;
      for(let i=0;i<5;i++){
        let ang=Math.PI/2+(-2+i)*0.25;
        enemyBullets.push({x:boss.x,y:boss.y+boss.r,vx:Math.cos(ang)*4*scale,vy:Math.sin(ang)*4*scale,r:5*scale,col:boss.color,life:1});
      }
    }

    for(let b of bullets){
      if(dist(b,boss)<boss.r+b.r){b.y=-999;boss.hp--;spawnParticles(b.x,b.y,boss.color,4);
        if(boss.hp<=0){boss.dead=true;score+=100*combo;
          spawnParticles(boss.x,boss.y,'#ff9f1c',30);
          spawnParticles(boss.x,boss.y,'#ff2d78',20);
          scoreEl.textContent='SCORE '+score;bossActive=false;}
      }
    }
    if(player.invincible<=0&&dist(player,boss)<player.r+boss.r-6*scale){
      hitPlayer();
    }
  }

  // particles
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.life-=0.03*dt;p.vx*=0.94;p.vy*=0.94;}
  particles=particles.filter(p=>p.life>0);

  // wave clear
  if(enemies.length===0&&!bossActive&&state===S.PLAYING){
    waveTimer-=dt;
    if(waveTimer<=0){waveTimer=90;
      if(wave>=10){state=S.WIN;showEnd(true);}
      else spawnWave();
    }
  }
}

function hitPlayer(){
  lives--;
  player.invincible=120;player.flash=120;
  spawnParticles(player.x,player.y,'#fff',10);
  combo=1;comboEl.style.opacity='0';
  livesEl.textContent='♥ '.repeat(lives).trim()||'✕';
  if(lives<=0){state=S.DEAD;showEnd(false);}
}

function showEnd(win){
  overlay.innerHTML=win
    ?`<h1>YOU WIN</h1><p class="big" style="color:#2dffcf">SCORE ${score}</p><p style="color:#888">ALL 10 WAVES CLEARED</p><button id="start-btn" style="margin-top:20px;padding:12px 36px;background:linear-gradient(90deg,#2dffcf,#60d9ff);border:none;border-radius:4px;color:#000;font-family:Orbitron,monospace;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;pointer-events:all">PLAY AGAIN</button>`
    :`<h1>GAME OVER</h1><p class="big" style="color:#ff2d78">SCORE ${score}</p><p style="color:#888">WAVE ${wave} · KEEP TRYING</p><button id="start-btn" style="margin-top:20px;padding:12px 36px;background:linear-gradient(90deg,#ff2d78,#ff9f1c);border:none;border-radius:4px;color:#000;font-family:Orbitron,monospace;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;pointer-events:all">RETRY</button>`;
  overlay.style.display='flex';
  overlay.querySelector('#start-btn').addEventListener('click',startGame);
}

// Stars
let stars=[];
for(let i=0;i<80;i++)stars.push({x:Math.random(),y:Math.random(),s:Math.random()*1.5+0.3,sp:Math.random()*0.3+0.1});

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);

  // stars
  ctx.save();
  for(let st of stars){
    st.y+=st.sp*0.003;if(st.y>1)st.y=0;
    let a=0.3+st.s*0.3;
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.arc(st.x*W,st.y*H,st.s*scale,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // grid scanline
  ctx.strokeStyle='rgba(45,255,207,0.03)';ctx.lineWidth=1;
  for(let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // enemy bullets
  for(let b of enemyBullets){
    ctx.save();
    ctx.shadowColor=b.col;ctx.shadowBlur=8;
    ctx.fillStyle=b.col;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // particles
  for(let p of particles){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // player bullets
  for(let b of bullets){
    ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=12;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // enemies
  for(let e of enemies){
    if(e.dead)continue;
    ctx.save();ctx.shadowColor=e.color;ctx.shadowBlur=14;
    let hpRatio=e.hp/e.maxHp;
    ctx.fillStyle=e.color;ctx.globalAlpha=0.9;
    // hexagon shape
    ctx.beginPath();
    for(let i=0;i<6;i++){let a=i*Math.PI/3-Math.PI/6;ctx.lineTo(e.x+Math.cos(a)*e.r,e.y+Math.sin(a)*e.r);}
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.globalAlpha=0.4;ctx.stroke();
    // hp bar if >1
    if(e.maxHp>1){
      ctx.globalAlpha=0.7;ctx.fillStyle='#333';ctx.fillRect(e.x-e.r,e.y+e.r+3,e.r*2,3);
      ctx.fillStyle=e.color;ctx.fillRect(e.x-e.r,e.y+e.r+3,e.r*2*hpRatio,3);
    }
    ctx.restore();
  }

  // boss
  if(bossActive&&boss&&!boss.dead){
    ctx.save();
    let pulse=0.8+0.2*Math.sin(Date.now()*0.005);
    ctx.shadowColor=boss.color;ctx.shadowBlur=30*pulse;
    ctx.fillStyle=boss.color;ctx.globalAlpha=0.95;
    // octagon boss
    ctx.beginPath();
    for(let i=0;i<8;i++){let a=i*Math.PI/4;ctx.lineTo(boss.x+Math.cos(a)*boss.r,boss.y+Math.sin(a)*boss.r);}
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.globalAlpha=0.5;ctx.stroke();
    // inner ring
    ctx.globalAlpha=0.3;ctx.beginPath();
    for(let i=0;i<8;i++){let a=i*Math.PI/4+boss.t;ctx.lineTo(boss.x+Math.cos(a)*boss.r*0.6,boss.y+Math.sin(a)*boss.r*0.6);}
    ctx.closePath();ctx.fillStyle='#fff';ctx.fill();
    // hp bar
    let hpRatio=boss.hp/boss.maxHp;
    ctx.globalAlpha=0.8;ctx.fillStyle='#1a1a2e';ctx.fillRect(W*0.1,12*scale,W*0.8,8*scale);
    ctx.fillStyle=`hsl(${hpRatio*120},100%,55%)`;ctx.fillRect(W*0.1,12*scale,W*0.8*hpRatio,8*scale);
    ctx.strokeStyle='#ff2d78';ctx.lineWidth=1;ctx.globalAlpha=0.5;ctx.strokeRect(W*0.1,12*scale,W*0.8,8*scale);
    ctx.restore();
  }

  // player
  if(state===S.PLAYING){
    let flashOn=player.flash<=0||Math.floor(player.flash/6)%2===0;
    if(flashOn){
      ctx.save();
      ctx.shadowColor='#2dffcf';ctx.shadowBlur=20;
      // ship shape
      ctx.fillStyle='#2dffcf';ctx.globalAlpha=0.95;
      ctx.beginPath();
      ctx.moveTo(player.x,player.y-player.r*1.4);
      ctx.lineTo(player.x-player.r,player.y+player.r);
      ctx.lineTo(player.x,player.y+player.r*0.4);
      ctx.lineTo(player.x+player.r,player.y+player.r);
      ctx.closePath();ctx.fill();
      // engine glow
      ctx.fillStyle='#ff9f1c';ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.arc(player.x,player.y+player.r,4*scale,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
}
</script>
