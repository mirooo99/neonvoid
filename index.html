<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NEON VOID</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;}
#wrap{position:relative;width:100vw;height:100vh;}
#gc{display:block;width:100%;height:100%;cursor:none;}
#ui{position:absolute;inset:0;pointer-events:none;}
html{scroll-behavior:smooth;}
html::-webkit-scrollbar{width:4px;}
html::-webkit-scrollbar-track{background:#030408;}
html::-webkit-scrollbar-thumb{background:rgba(0,255,178,0.2);border-radius:2px;}
*{scrollbar-width:thin;scrollbar-color:rgba(0,255,178,0.2) #030408;}

.hud-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 20px;pointer-events:none;gap:8px;}
.hud-box{background:rgba(0,0,0,0.6);border:1px solid rgba(45,255,207,0.18);padding:7px 14px;border-radius:4px;min-width:80px;}
.hud-label{font-size:9px;letter-spacing:3px;color:rgba(45,255,207,0.45);margin-bottom:2px;text-transform:uppercase;}
.hud-value{font-size:18px;font-family:'Orbitron',monospace;font-weight:700;color:#2dffcf;letter-spacing:1px;}
#lives-val{color:#ff2d78;}
#wave-val{color:#ff9f1c;text-align:center;}
#mode-badge{position:absolute;top:62px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;padding:3px 10px;border-radius:3px;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);pointer-events:none;}
#mode-badge.endless{border-color:rgba(167,139,250,0.4);color:#a78bfa;}
#mode-badge.daily{border-color:rgba(255,245,68,0.4);color:#fff544;}

#weapon-row{position:absolute;top:82px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;pointer-events:none;}
.wslot{background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:4px 10px;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);transition:all .3s;}
.wslot.active{border-color:rgba(45,255,207,0.5);color:#2dffcf;}
.wslot.locked{color:rgba(255,255,255,0.12);}

#upgrade-bar-wrap{position:absolute;top:82px;left:20px;pointer-events:none;}
#upgrade-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,159,28,0.5);margin-bottom:4px;}
#upgrade-track{width:140px;height:4px;background:rgba(255,159,28,0.15);border:1px solid rgba(255,159,28,0.2);border-radius:2px;overflow:hidden;}
#upgrade-fill{height:100%;background:linear-gradient(90deg,#ff9f1c,#fff544);border-radius:2px;transition:width .2s;}

#shield-bar-wrap{position:absolute;top:82px;right:20px;pointer-events:none;text-align:right;}
#shield-lbl{font-size:9px;letter-spacing:2px;color:rgba(96,217,255,0.5);margin-bottom:4px;}
#shield-track{width:120px;height:4px;background:rgba(96,217,255,0.1);border:1px solid rgba(96,217,255,0.2);border-radius:2px;overflow:hidden;margin-left:auto;}
#shield-fill{height:100%;background:linear-gradient(90deg,#60d9ff,#2dffcf);border-radius:2px;transition:width .3s;}

#combo-bar{position:absolute;top:110px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;transition:opacity .4s;}
#combo-bar.hidden{opacity:0;}
#combo-txt{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:4px;color:#ff9f1c;}
#combo-fill-wrap{width:160px;height:3px;background:rgba(255,159,28,0.2);border-radius:2px;margin:3px auto 0;}
#combo-fill{height:3px;background:#ff9f1c;border-radius:2px;}
#streak-txt{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:3px;margin-top:3px;opacity:0;transition:opacity .3s;}

#boss-bar-wrap{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);width:min(560px,75vw);pointer-events:none;opacity:0;transition:opacity .4s;}
#boss-bar-wrap.show{opacity:1;}
#boss-lbl{font-size:9px;letter-spacing:3px;color:#ff2d78;text-align:center;margin-bottom:5px;}
#boss-phase-lbl{font-size:9px;letter-spacing:2px;color:#ff9f1c;text-align:center;margin-bottom:4px;min-height:12px;}
#boss-track{height:10px;background:rgba(255,45,120,0.12);border:1px solid rgba(255,45,120,0.25);border-radius:5px;overflow:hidden;}
#boss-fill{height:100%;background:linear-gradient(90deg,#ff2d78,#ff9f1c);border-radius:5px;transition:width .1s,background .5s;}

#wave-flash{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .5s;}
#wave-flash-txt{font-family:'Orbitron',monospace;font-size:clamp(22px,5vw,52px);font-weight:900;letter-spacing:6px;color:#2dffcf;text-shadow:0 0 40px rgba(45,255,207,0.8);}
#wave-flash-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:8px;}

#pu-notify{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity .4s;}
#pu-notify-txt{font-family:'Orbitron',monospace;font-size:clamp(16px,3vw,24px);font-weight:900;letter-spacing:4px;}
#pu-notify-sub{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:4px;}

#ach-toast{position:absolute;top:140px;right:20px;pointer-events:none;opacity:0;transition:opacity .4s;max-width:220px;}
.ach-inner{background:rgba(5,5,25,0.92);border:1px solid rgba(255,245,68,0.4);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.ach-icon{font-size:22px;flex-shrink:0;}
.ach-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:#fff544;margin-bottom:2px;}
.ach-name{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:1px;}

#scorecard{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,5,0.85);opacity:0;transition:opacity .3s;pointer-events:none;}
#scorecard.show{opacity:1;pointer-events:all;}
.sc-box{background:rgba(5,5,25,0.95);border:1px solid rgba(45,255,207,0.25);border-radius:8px;padding:36px 48px;min-width:340px;text-align:center;max-height:90vh;overflow-y:auto;}
.sc-title{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:5px;color:rgba(45,255,207,0.5);margin-bottom:24px;}
.sc-row{display:flex;justify-content:space-between;gap:32px;margin-bottom:12px;font-size:12px;letter-spacing:2px;}
.sc-lbl{color:rgba(255,255,255,0.3);}
.sc-val{color:#fff;font-family:'Orbitron',monospace;font-weight:700;}
.sc-bonus{color:#ff9f1c;}
.sc-divider{height:1px;background:rgba(45,255,207,0.1);margin:16px 0;}

.diff-cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.diff-card{background:rgba(5,5,20,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:20px 24px;cursor:pointer;transition:all .2s;min-width:160px;pointer-events:all;}
.diff-card:hover{transform:translateY(-4px);}
.diff-card.danger{border-color:rgba(255,45,120,0.4);}
.diff-card.danger:hover{background:rgba(255,45,120,0.08);border-color:rgba(255,45,120,0.7);}
.diff-card.warn{border-color:rgba(255,159,28,0.4);}
.diff-card.warn:hover{background:rgba(255,159,28,0.08);border-color:rgba(255,159,28,0.7);}
.diff-card.cyan{border-color:rgba(45,255,207,0.4);}
.diff-card.cyan:hover{background:rgba(45,255,207,0.08);border-color:rgba(45,255,207,0.7);}
.diff-card-icon{font-size:28px;margin-bottom:8px;}
.diff-card-name{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:3px;margin-bottom:6px;}
.diff-card.danger .diff-card-name{color:#ff2d78;}
.diff-card.warn .diff-card-name{color:#ff9f1c;}
.diff-card.cyan .diff-card-name{color:#2dffcf;}
.diff-card-desc{font-size:9px;letter-spacing:1px;color:rgba(255,255,255,0.3);line-height:1.5;}
.diff-card-reward{font-size:9px;letter-spacing:1px;color:#fff544;margin-top:6px;}

.score-pop{position:absolute;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;pointer-events:none;animation:popUp 1s forwards;}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1);}50%{opacity:1;transform:translateY(-24px) scale(1.1);}100%{opacity:0;transform:translateY(-52px) scale(0.9);}}

#last-stand{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;}
#last-stand.show{animation:lastStandFlash 0.4s ease;}
@keyframes lastStandFlash{0%{opacity:0.8;background:rgba(255,45,120,0.3);}100%{opacity:0;background:transparent;}}
#last-stand-txt{font-family:'Orbitron',monospace;font-size:clamp(28px,6vw,64px);font-weight:900;letter-spacing:6px;color:#ff2d78;text-shadow:0 0 60px rgba(255,45,120,1);}

/* ── SHIP SELECT ── */
.ship-select{display:flex;gap:16px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
.ship-opt{width:90px;height:90px;border:2px solid rgba(255,255,255,0.12);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .2s;background:rgba(5,5,20,0.8);}
.ship-opt:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.28);}
.ship-opt.selected{border-color:rgba(45,255,207,0.8);background:rgba(45,255,207,0.1);box-shadow:0 0 18px rgba(45,255,207,0.15);}
.ship-opt.locked-ship{border-color:rgba(255,255,255,0.06);opacity:0.4;cursor:default;}
.ship-opt canvas{display:block;}
.ship-opt-name{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.4);}
.ship-opt.selected .ship-opt-name{color:#2dffcf;}

/* ── OVERLAY / MAIN MENU ── */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:rgba(0,0,5,0.92);pointer-events:all;overflow-y:auto;padding:40px 24px 60px;}
#overlay.hidden{display:none;}
.ov-title{font-family:'Orbitron',monospace;font-size:clamp(30px,7vw,76px);font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#ff2d78 0%,#ff9f1c 50%,#2dffcf 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.ov-sub{color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:6px;margin-bottom:28px;}
.ov-score-lbl{color:rgba(255,255,255,0.25);font-size:10px;letter-spacing:3px;margin-bottom:5px;}
.ov-score{font-family:'Orbitron',monospace;font-size:clamp(32px,5vw,58px);font-weight:900;margin-bottom:6px;}
.ov-score.cyan{color:#2dffcf;}
.ov-score.red{color:#ff2d78;}
.ov-detail{color:rgba(255,255,255,0.25);font-size:10px;letter-spacing:2px;margin-bottom:24px;}
.ov-controls{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;justify-content:center;padding:12px 20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;}
.ov-ctrl{text-align:center;color:rgba(255,255,255,0.22);font-size:9px;letter-spacing:2px;}
.ov-ctrl strong{display:block;color:rgba(255,255,255,0.6);font-size:11px;margin-bottom:4px;font-family:'Orbitron',monospace;}

/* ── SECTION HEADERS ── */
.sec-hdr{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.2);margin-bottom:14px;margin-top:6px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07);width:100%;max-width:480px;text-align:center;}

/* ── HIGH SCORES ── */
.hs-row{display:flex;gap:28px;margin-bottom:28px;flex-wrap:wrap;justify-content:center;}
.hs-item{text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:12px 20px;min-width:110px;}
.hs-label{font-size:8px;letter-spacing:3px;margin-bottom:6px;}
.hs-value{font-family:'Orbitron',monospace;font-size:26px;font-weight:700;}

/* ── BUTTONS ── */
.btn{padding:13px 44px;border:none;border-radius:4px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:transform .1s,box-shadow .2s;}
.btn:hover{transform:scale(1.05);}
.btn.primary{background:linear-gradient(90deg,#ff2d78,#ff9f1c);color:#000;box-shadow:0 0 28px rgba(255,45,120,0.4);min-width:240px;font-size:15px;padding:16px 44px;}
.btn.primary:hover{box-shadow:0 0 50px rgba(255,45,120,0.7);}
.btn.cyan{background:linear-gradient(90deg,#2dffcf,#60d9ff);color:#000;box-shadow:0 0 28px rgba(45,255,207,0.35);}
.btn.purple{background:linear-gradient(90deg,#a78bfa,#ff6bff);color:#000;box-shadow:0 0 28px rgba(167,139,250,0.35);}
.btn.gold{background:linear-gradient(90deg,#fff544,#ff9f1c);color:#000;box-shadow:0 0 28px rgba(255,245,68,0.35);}
.btn.sm{padding:9px 24px;font-size:10px;}
.btn-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}

/* ── MODE TABS ── */
.mode-tabs{display:flex;gap:0;margin-bottom:8px;border:1px solid rgba(255,255,255,0.12);border-radius:6px;overflow:hidden;width:100%;max-width:506px;}
.mode-tab{flex:1;padding:10px 0;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.3);transition:all .2s;}
.mode-tab.active{background:rgba(45,255,207,0.12);color:#2dffcf;}

/* ── ACHIEVEMENTS ── */
.ach-panel{margin-bottom:20px;max-width:480px;width:100%;}
.ach-panel-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.2);margin-bottom:12px;text-align:center;}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
.ach-item{background:rgba(5,5,20,0.7);border:1px solid rgba(255,255,255,0.06);border-radius:5px;padding:8px 10px;text-align:center;transition:all .3s;}
.ach-item.unlocked{border-color:rgba(255,245,68,0.3);background:rgba(255,245,68,0.04);}
.ach-item-icon{font-size:18px;margin-bottom:4px;}
.ach-item-name{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,0.25);}
.ach-item.unlocked .ach-item-name{color:#fff544;}

/* ── DAILY BADGE ── */
.daily-info{background:rgba(255,245,68,0.06);border:1px solid rgba(255,245,68,0.2);border-radius:6px;padding:10px 18px;margin-bottom:16px;text-align:center;}
.daily-info-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:#fff544;margin-bottom:4px;}
.daily-info-sub{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;}

#dpad{position:absolute;bottom:24px;right:24px;display:none;pointer-events:all;}
@media(hover:none){#dpad{display:block;}}
.dpad-ring{width:130px;height:130px;position:relative;}
.dpad-btn{position:absolute;width:40px;height:40px;background:rgba(45,255,207,0.1);border:1px solid rgba(45,255,207,0.25);border-radius:4px;display:flex;align-items:center;justify-content:center;color:rgba(45,255,207,0.5);font-size:16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.dpad-btn:active{background:rgba(45,255,207,0.25);}
#dp-up{top:0;left:45px;}#dp-down{bottom:0;left:45px;}#dp-left{left:0;top:45px;}#dp-right{right:0;top:45px;}

#zone-txt{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:#fff544;pointer-events:none;opacity:0;transition:opacity .3s;}
#zone-txt.show{opacity:1;}
@keyframes splitFlash{0%{opacity:0.9;}100%{opacity:0;transform:scale(3);}}

.icon-red {
  color: #ff2d78;
}

.icon-yellow {
  color: #ff9f1c;
}

.icon-cyan {
  color: #2dffcf;
}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc"></canvas>
<div id="ui">
  <div class="hud-top">
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div class="hud-box" style="text-align:center;flex:1;max-width:160px;margin:0 auto;">
      <div class="hud-label" style="text-align:center;">Wave</div>
      <div class="hud-value" id="wave-val" style="text-align:center;">1</div>
    </div>
    <div class="hud-box" style="text-align:right;">
      <div class="hud-label">Lives</div>
      <div class="hud-value" id="lives-val">3</div>
    </div>
  </div>
  <div id="mode-badge"></div>
  <div id="upgrade-bar-wrap">
    <div id="upgrade-lbl">UPGRADE 0/10</div>
    <div id="upgrade-track"><div id="upgrade-fill" style="width:0%"></div></div>
  </div>
  <div id="shield-bar-wrap">
    <div id="shield-lbl">SHIELD</div>
    <div id="shield-track"><div id="shield-fill" style="width:0%"></div></div>
  </div>
  <div id="weapon-row">
    <div class="wslot active" id="ws-basic">BASIC</div>
    <div class="wslot locked" id="ws-rapid">RAPID</div>
    <div class="wslot locked" id="ws-laser">LASER</div>
    <div class="wslot locked" id="ws-missile">MISSILE</div>
    <div class="wslot locked" id="ws-orbit">ORBIT</div>
  </div>
  <div id="combo-bar" class="hidden">
    <div id="combo-txt">COMBO x1</div>
    <div id="combo-fill-wrap"><div id="combo-fill" style="width:100%"></div></div>
    <div id="streak-txt"></div>
  </div>
  <div id="boss-bar-wrap">
    <div id="boss-lbl">BOSS</div>
    <div id="boss-phase-lbl"></div>
    <div id="boss-track"><div id="boss-fill" style="width:100%"></div></div>
  </div>
  <div id="wave-flash"><div id="wave-flash-txt">WAVE 1</div><div id="wave-flash-sub"></div></div>
  <div id="pu-notify"><div id="pu-notify-txt"></div><div id="pu-notify-sub"></div></div>
  <div id="last-stand"><div id="last-stand-txt">LAST STAND</div></div>
  <div id="zone-txt">SCORE ZONE - 2x POINTS</div>
  <div id="ach-toast">
    <div class="ach-inner">
      <div class="ach-icon" id="ach-toast-icon">🏆</div>
      <div class="ach-texts">
        <div class="ach-title">ACHIEVEMENT</div>
        <div class="ach-name" id="ach-toast-name"></div>
      </div>
    </div>
  </div>
  <div id="dpad">
    <div class="dpad-ring">
      <div class="dpad-btn" id="dp-up">^</div>
      <div class="dpad-btn" id="dp-down">v</div>
      <div class="dpad-btn" id="dp-left">&lt;</div>
      <div class="dpad-btn" id="dp-right">&gt;</div>
    </div>
  </div>
</div>

<div id="scorecard">
  <div class="sc-box">
    <div class="sc-title">WAVE COMPLETE</div>
    <div id="sc-content"></div>
    <div class="sc-divider"></div>
    <div style="text-align:center;margin-top:12px;">
      <div style="font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-bottom:14px;">CHOOSE NEXT WAVE MODIFIER</div>
      <div class="diff-cards" id="sc-diff-cards"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="ov-title">NEON VOID</div>
  <div class="ov-sub">SURVIVE THE SWARM</div>
  <div id="main-menu-content"></div>
</div>
</div>

<script>
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }
document.addEventListener('click', resumeAC, {once:true});
document.addEventListener('keydown', resumeAC, {once:true});

function sfx(type){
  if(AC.state==='suspended') return;
  const g=AC.createGain(); g.connect(AC.destination);
  const o=AC.createOscillator();
  o.connect(g);
  const now=AC.currentTime;
  switch(type){
    case 'shoot':
      o.type='square'; o.frequency.setValueAtTime(880,now); o.frequency.exponentialRampToValueAtTime(220,now+0.06);
      g.gain.setValueAtTime(0.06,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.07);
      o.start(now); o.stop(now+0.07); break;
    case 'hit':
      o.type='sawtooth'; o.frequency.setValueAtTime(300,now); o.frequency.exponentialRampToValueAtTime(80,now+0.08);
      g.gain.setValueAtTime(0.12,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.09);
      o.start(now); o.stop(now+0.09); break;
    case 'explode':
      const buf=AC.createBuffer(1,AC.sampleRate*0.15,AC.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
      const src=AC.createBufferSource(); src.buffer=buf;
      const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=500;
      src.connect(f); f.connect(g);
      g.gain.setValueAtTime(0.18,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
      src.start(now); src.stop(now+0.15);
      o.disconnect(); break;
    case 'powerup':
      o.type='sine'; o.frequency.setValueAtTime(440,now); o.frequency.exponentialRampToValueAtTime(880,now+0.1); o.frequency.exponentialRampToValueAtTime(1320,now+0.18);
      g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.22);
      o.start(now); o.stop(now+0.22); break;
    case 'damage':
      o.type='sawtooth'; o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(40,now+0.2);
      g.gain.setValueAtTime(0.15,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.22);
      o.start(now); o.stop(now+0.22); break;
    case 'boss':
      o.type='square'; o.frequency.setValueAtTime(55,now); o.frequency.setValueAtTime(80,now+0.1); o.frequency.setValueAtTime(55,now+0.2);
      g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
      o.start(now); o.stop(now+0.35); break;
    case 'upgrade':
      o.type='sine';
      [523,659,784,1047].forEach((f,i)=>{ o.frequency.setValueAtTime(f,now+i*0.07); });
      g.gain.setValueAtTime(0.12,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
      o.start(now); o.stop(now+0.4); break;
    case 'achieve':
      o.type='triangle';
      [660,880,1100,1320].forEach((f,i)=>{ o.frequency.setValueAtTime(f,now+i*0.06); });
      g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
      o.start(now); o.stop(now+0.35); break;
    default: o.disconnect();
  }
}

function getDailyDate(){ let d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function mulberry32(seed){ return ()=>{ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; }; }
function dateToSeed(ds){ let h=0; for(let c of ds){h=Math.imul(31,h)+c.charCodeAt(0)|0;} return h; }

function spawnZones(){
  multiplierZones=[];
  let n=1+Math.floor(rng()*2);
  for(let i=0;i<n;i++) multiplierZones.push({x:W*0.15+rng()*W*0.7,y:H*0.4+rng()*H*0.4,r:Math.min(W,H)*0.09,pulse:rng()*Math.PI*2});
}

function spawnWave(){
  wave++;
  waveValEl.textContent=gameMode==='endless'?'∞ '+wave:wave;
  waveKills=0;waveStart=score;waveNoHit=true;
  enemies=[];bossActive=false;boss=null;
  bossWrap.classList.remove('show');
  asteroids=[];laserWalls=[];
  let effectiveWave=gameMode==='endless'?Math.min(wave,10)+Math.floor(wave/10):wave;
  let count=Math.round((4+effectiveWave*2)*diffMod.enemyCount);
  let types=['zigzag','straight','circular','diagonal','sine','spiral'];
  if(effectiveWave>=4) types.push('splitter');
  if(effectiveWave>=7) types.push('charger');
  for(let i=0;i<count;i++){
    let t=types[Math.floor(rng()*Math.min(effectiveWave+1,types.length))];
    let col=COLORS[Math.floor(rng()*COLORS.length)];
    let ehp=1+(effectiveWave>3?1:0)+(effectiveWave>6?1:0)+(effectiveWave>9?1:0);
    let isElite=rng()<0.08+effectiveWave*0.01;
    enemies.push({x:player.r*4+rng()*(W-player.r*8),y:-35-i*45,r:Math.min(W,H)*(isElite?0.024:0.018),hp:isElite?ehp*3:ehp,maxHp:isElite?ehp*3:ehp,speed:(1.0+effectiveWave*0.18)*(H/600),type:t,t:rng()*100,color:isElite?'#ffd700':col,side:rng()>0.5?1:-1,shootCd:rng()*60,shootRate:Math.max(100-effectiveWave*7,25)/diffMod.bulletSpeed,dead:false,spawnX:0,elite:isElite,chargeVx:0,chargeVy:0,chargeActive:false,chargeCd:rng()*80+80,hasSplit:false});
  }
  if(wave%3!==0&&wave>1&&rng()<0.35) setTimeout(()=>{ if(state===SC.PLAYING&&!bossActive) spawnMiniBoss(); },5000);
  if(wave%3===0) spawnBoss();
  let sub=diffMod.reward?'BONUS: '+diffMod.reward:'';
  showWaveFlash(gameMode==='endless'?'WAVE '+wave:('WAVE '+wave),sub);
  sfx('boss');
  if(wave===5) checkAch('wave5');
  if(wave===10&&gameMode==='classic') checkAch('wave10');
  if(wave===50&&gameMode==='endless') checkAch('endless50');
}

function spawnBoss(){
  bossActive=true;
  let effectiveWave=gameMode==='endless'?Math.min(wave,10)+Math.floor(wave/10):wave;
  let bHp=Math.round((10+effectiveWave*4)*diffMod.bossHp);
  boss={x:W/2,y:H*0.14,r:Math.min(W,H)*0.055,hp:bHp,maxHp:bHp,vx:1.5*(W/680),t:0,color:'#ff2d78',dead:false,shootCd:0,shootRate:35,phase:0,phaseTimer:200,weakX:0,weakY:0,weakAngle:0,splitDone:false};
  boss.weakX=boss.r*0.6; boss.weakY=-boss.r*0.3;
  bossWrap.classList.add('show'); updateBossPhase(); sfx('boss');
}

function spawnMiniBoss(){
  let mHp=6+wave*2;
  enemies.push({x:W*0.3+rng()*W*0.4,y:-50,r:Math.min(W,H)*0.034,hp:mHp,maxHp:mHp,speed:(0.8+wave*0.12)*(H/600),type:'zigzag',t:0,color:'#ff6bff',side:1,shootCd:0,shootRate:30,dead:false,spawnX:0,elite:false,mini:true,hasSplit:false,chargeVx:0,chargeVy:0,chargeActive:false,chargeCd:999});
}

function updateBossPhase(){
  if(!boss) return;
  let ratio=boss.hp/boss.maxHp;
  let newPhase=ratio>0.66?0:ratio>0.33?1:2;
  if(newPhase!==boss.phase){ boss.phase=newPhase; doScreenShake(14,20); spawnParticles(boss.x,boss.y,boss.color,25,5); sfx('damage'); }
  let names=['PHASE I — FAN ATTACK','PHASE II — AIMED BURST','PHASE III — FULL ASSAULT'];
  bossPhaseLbl.textContent=names[boss.phase]||'';
  let cols=['#ff9f1c','#ff6bff','#ff2d78'];
  bossFill.style.background='linear-gradient(90deg,'+cols[boss.phase]+',#fff544)';
}

function showWaveFlash(txt,sub){
  waveFlashTxt.textContent=txt; waveFlashSub.textContent=sub||'';
  waveFlash.style.opacity='1'; setTimeout(()=>{waveFlash.style.opacity='0';},1600);
}
function showPuNotify(name,sub,color){
  puNotifyTxt.textContent=name; puNotifyTxt.style.color=color||'#2dffcf';
  puNotifySub.textContent=sub||''; puNotify.style.opacity='1';
  setTimeout(()=>{puNotify.style.opacity='0';},1800);
}
function doScreenShake(mag,dur){ shakeMag=mag; setTimeout(()=>{shakeMag=0;shakeX=0;shakeY=0;},dur*16); }
function flashScreen(col){ screenFlashes.push({col,life:1}); }
function spawnParticles(x,y,col,n,speed){
  n=n||10; speed=speed||3;
  for(let i=0;i<n;i++){
    let a=rng()*Math.PI*2, sp=(0.5+rng())*speed;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col,r:2+rng()*3});
  }
}
function spawnPop(x,y,val,col){
  let el=document.createElement('div'); el.className='score-pop';
  el.textContent='+'+val;
  el.style.cssText='left:'+x+'px;top:'+y+'px;color:'+(col||'#fff544')+';z-index:10;position:absolute;pointer-events:none;';
  document.getElementById('ui').appendChild(el); setTimeout(()=>el.remove(),1000);
}
function updateWeaponHUD(){ Object.keys(weapons).forEach(k=>{ wsSlots[k].className='wslot'+(weapons[k]?' active':' locked'); }); }
function updateUpgradeBar(){ let pct=Math.min(upgradeKills/upgradeThreshold*100,100); upgradeFill.style.width=pct+'%'; upgradeLbl.textContent='UPGRADE '+upgradeKills+'/'+upgradeThreshold; }
function updateShieldBar(){ shieldFill.style.width=(shieldHp/maxShieldHp*100)+'%'; }

function applyUpgrade(){
  upgradeKills=0;
  let order=['rapid','laser','missile','orbit'];
  for(let w of order){ if(!weapons[w]){ weapons[w]=true; updateWeaponHUD();
    let names={rapid:'RAPID FIRE',laser:'LASER BEAM',missile:'MISSILES',orbit:'ORBIT SHIELD'};
    let descs={rapid:'Triple fire rate',laser:'Piercing laser beam',missile:'Homing missiles',orbit:'Rotating shield bullets'};
    showPuNotify(names[w]+' UNLOCKED',descs[w],'#fff544');
    if(w==='orbit') orbitShields=[{angle:0},{angle:Math.PI*0.66},{angle:Math.PI*1.33}];
    sfx('upgrade'); return;
  }}
}

function activatePowerup(type){
  sfx('powerup');
  if(type==='shield'){ shieldHp=Math.min(shieldHp+2,maxShieldHp); updateShieldBar(); showPuNotify('SHIELD RESTORED','+2 shield energy','#60d9ff'); }
  else if(type==='rapid'){ player.rapidTimer=300; showPuNotify('RAPID FIRE','10 seconds of chaos','#ff9f1c'); }
  else if(type==='bomb'){
    showPuNotify('SCREEN BOMB','All enemies destroyed','#ff6bff');
    doScreenShake(20,30); flashScreen('rgba(255,107,255,0.25)');
    let killed=0;
    for(let e of enemies){ if(!e.dead){ spawnParticles(e.x,e.y,e.color,12,4); e.dead=true; waveKills++; totalKills++; upgradeKills++; score+=Math.round(5*combo); killed++; }}
    checkAch_kills(killed,'bomb');
    for(let b of enemyBullets) b.life=0; enemyBullets=[];
    scoreValEl.textContent=score; updateUpgradeBar();
    if(upgradeKills>=upgradeThreshold) applyUpgrade();
  }
  else if(type==='laser'){ laserActive=true; laserTimer=180; showPuNotify('LASER BEAM','Piercing energy beam','#2dffcf'); }
  else if(type==='missile'){ missileTimer=300; showPuNotify('HOMING MISSILES','Locked and loaded','#a78bfa'); }
  else if(type==='life'){ lives=Math.min(lives+1,5); livesValEl.textContent=lives; showPuNotify('EXTRA LIFE','Lives +1','#ff2d78'); }
}

let _bombKillSession=0;
function checkAch_kills(n,src){
  if(src==='bomb'){ _bombKillSession+=n; if(_bombKillSession>=10) checkAch('bombkill10'); }
}

function shoot(){
  let sc2=W/680, sp=12*(H/600);
  let rapid=player.rapidTimer>0||weapons.rapid;
  let shootInterval=rapid?4:9;
  if(shootTimer>0) return;
  shootTimer=shootInterval; shotsFired++;
  sfx('shoot');
  let ship=SHIPS[save.selectedShip];
  let bColor=ship?ship.color:'#2dffcf';
  bullets.push({x:player.x,y:player.y-player.r,vy:-sp,vx:0,r:4*sc2,color:bColor,piercing:false});
  if(combo>=3||rapid){
    bullets.push({x:player.x-11*sc2,y:player.y-player.r*0.5,vy:-sp,vx:-1.8*sc2,r:3*sc2,color:'#60d9ff',piercing:false});
    bullets.push({x:player.x+11*sc2,y:player.y-player.r*0.5,vy:-sp,vx:1.8*sc2,r:3*sc2,color:'#60d9ff',piercing:false});
  }
  if(combo>=6){
    bullets.push({x:player.x-22*sc2,y:player.y,vy:-sp*0.9,vx:-3.2*sc2,r:3*sc2,color:'#a78bfa',piercing:false});
    bullets.push({x:player.x+22*sc2,y:player.y,vy:-sp*0.9,vx:3.2*sc2,r:3*sc2,color:'#a78bfa',piercing:false});
  }
  if(weapons.missile&&missileTimer>0){
    let target=nearestEnemy();
    if(target) bullets.push({x:player.x,y:player.y-player.r,vy:-sp*0.5,vx:0,r:5*sc2,color:'#a78bfa',missile:true,target,piercing:false});
  }
}

function nearestEnemy(){
  let best=null,bd=9999;
  let arr=[...enemies,...(bossActive&&boss&&!boss.dead?[boss]:[])];
  for(let e of arr){ if(e.dead) continue; let d=dist(player,e); if(d<bd){bd=d;best=e;} }
  return best;
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

let lastTime=0, loopGen=0;
function loop(ts,gen){
  if(gen!==loopGen) return;
  if(state!==SC.PLAYING){lastTime=0;return;}
  if(lastTime===0) lastTime=ts;
  let rawDt=Math.min((ts-lastTime)/16.667,3); lastTime=ts;
  let dt=rawDt*bulletTimeScale;
  if(bulletTimeTimer>0){bulletTimeTimer-=rawDt;if(bulletTimeTimer<=0) bulletTimeScale=1;}
  update(dt,rawDt); draw();
  requestAnimationFrame(ts2=>loop(ts2,gen));
}
function startLoop(){ loopGen++; lastTime=0; const gen=loopGen; requestAnimationFrame(ts=>loop(ts,gen)); }

function update(dt,rawDt){
  let sc2=W/680;
  if(shakeMag>0){shakeX=(Math.random()-0.5)*shakeMag;shakeY=(Math.random()-0.5)*shakeMag;shakeMag*=0.85;if(shakeMag<0.5)shakeMag=0;}
  else{shakeX=0;shakeY=0;}
  for(let f of screenFlashes) f.life-=0.05*rawDt;
  screenFlashes=screenFlashes.filter(f=>f.life>0);
  if(lastStandActive){lastStandTimer-=rawDt;if(lastStandTimer<=0){lastStandActive=false;state=SC.DEAD;showEnd(false);return;}}
  if(dpadDir.up){targetY=player.y-60;targetX=player.x;}
  if(dpadDir.down){targetY=player.y+60;targetX=player.x;}
  if(dpadDir.left){targetX=player.x-60;targetY=player.y;}
  if(dpadDir.right){targetX=player.x+60;targetY=player.y;}
  if(targetX!==null){
    player.vx+=(targetX-player.x)*0.2*0.35-player.vx*0.35;
    player.vy+=(targetY-player.y)*0.2*0.35-player.vy*0.35;
  }
  player.x=Math.max(player.r+2,Math.min(W-player.r-2,player.x+player.vx*dt));
  player.y=Math.max(player.r+2,Math.min(H-player.r-2,player.y+player.vy*dt));
  if(player.invincible>0) player.invincible-=dt;
  if(player.flash>0) player.flash-=dt;
  if(player.rapidTimer>0) player.rapidTimer-=rawDt;
  player.trail.push({x:player.x,y:player.y,life:1});
  if(player.trail.length>16) player.trail.shift();
  for(let t of player.trail) t.life-=0.07;
  inZone=false;
  for(let z of multiplierZones){z.pulse+=0.04*dt;if(dist(player,z)<z.r){inZone=true;break;}}
  inZone?zoneTxt.classList.add('show'):zoneTxt.classList.remove('show');
  if(weapons.orbit&&orbitShields.length>0){
    for(let o of orbitShields){o.angle+=0.04*dt;o.x=player.x+Math.cos(o.angle)*player.r*2.8;o.y=player.y+Math.sin(o.angle)*player.r*2.8;}
  }
  if(laserActive){laserTimer-=dt;if(laserTimer<=0) laserActive=false;}
  shootTimer-=dt; if(shootTimer<=0) shoot();
  for(let b of bullets){
    if(b.missile&&b.target&&!b.target.dead){
      let ang=Math.atan2(b.target.y-b.y,b.target.x-b.x); let sp=10*(H/600);
      b.vx=b.vx*0.85+Math.cos(ang)*sp*0.15; b.vy=b.vy*0.85+Math.sin(ang)*sp*0.15;
    }
  }
  if(comboTimer>0){
    comboTimer-=dt; comboFill.style.width=Math.max(0,(comboTimer/150)*100)+'%';
    if(comboTimer<=0){combo=1;comboBar.classList.add('hidden');}
  }
  for(let b of bullets){b.x+=(b.vx||0)*dt;b.y+=b.vy*dt;}
  bullets=bullets.filter(b=>b.y>-30&&b.x>-30&&b.x<W+30&&b.y<H+30);
  if(laserActive){
    let lx=player.x,ly=player.y-player.r;
    let testEnems=[...enemies,...(bossActive&&boss&&!boss.dead?[boss]:[])];
    for(let e of testEnems){
      if(e.dead) continue;
      if(Math.abs(e.x-lx)<e.r+8&&e.y<ly){
        e.hp-=0.25*dt; shotsHit+=0.1;
        spawnParticles(e.x,e.y,e.color,1,1);
        if(e.hp<=0&&!e.dead) killEnemy(e,lx,e.y);
      }
    }
  }
  if(weapons.orbit){
    for(let o of orbitShields){
      if(!o.x) continue;
      let oa={x:o.x,y:o.y,r:player.r*0.5};
      for(let b of enemyBullets){if(dist(oa,b)<oa.r+b.r){b.life=0;spawnParticles(b.x,b.y,'#2dffcf',4,2);}}
      for(let e of enemies){if(!e.dead&&dist(oa,e)<oa.r+e.r*0.7){e.hp-=0.1*dt;if(e.hp<=0) killEnemy(e,e.x,e.y);}}
    }
    enemyBullets=enemyBullets.filter(b=>b.life>0);
  }
  for(let e of enemies){
    if(e.dead) continue;
    e.t+=0.04*dt;
    if(!e.spawnX) e.spawnX=e.x;
    let spd=e.speed*bulletTimeScale;
    if(e.type==='charger'){
      if(!e.chargeActive){
        e.chargeCd-=dt; e.y+=spd*0.3*dt;
        if(e.chargeCd<=0&&e.y>0){
          let ang=Math.atan2(player.y-e.y,player.x-e.x);
          e.chargeVx=Math.cos(ang)*spd*5; e.chargeVy=Math.sin(ang)*spd*5;
          e.chargeActive=true; e.chargeCd=rng()*80+80;
          spawnParticles(e.x,e.y,e.color,8,2);
        }
      } else {
        e.x+=e.chargeVx*dt; e.y+=e.chargeVy*dt;
        e.chargeVx*=0.94; e.chargeVy*=0.94;
        if(Math.abs(e.chargeVx)<0.3&&Math.abs(e.chargeVy)<0.3) e.chargeActive=false;
      }
    } else {
      switch(e.type){
        case 'straight': e.y+=spd*dt; break;
        case 'zigzag': e.y+=spd*dt; e.x+=Math.sin(e.t*2.5)*2.5*sc2*dt; break;
        case 'sine': e.y+=spd*0.6*dt; e.x+=Math.cos(e.t*1.5)*3.5*sc2*dt; break;
        case 'diagonal': e.y+=spd*dt; e.x+=spd*0.6*e.side*dt; break;
        case 'circular': e.y+=spd*0.5*dt; e.x=e.spawnX+Math.sin(e.t*2.2)*80*sc2; break;
        case 'spiral': e.y+=spd*0.7*dt; e.x+=Math.cos(e.t*3)*4*sc2*dt; break;
        case 'splitter': e.y+=spd*0.8*dt; e.x+=Math.sin(e.t*1.8)*2*sc2*dt; break;
      }
    }
    e.x=Math.max(e.r,Math.min(W-e.r,e.x));
    e.shootCd-=dt;
    if(e.shootCd<=0&&e.y>0&&e.y<H*0.78){
      e.shootCd=e.shootRate;
      let ang=Math.atan2(player.y-e.y,player.x-e.x);
      let bsp=2.8*sc2*diffMod.bulletSpeed;
      enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(ang)*bsp,vy:Math.sin(ang)*bsp,r:4*sc2,col:e.color,life:1});
      if(wave>5||e.elite){
        for(let s of[-0.3,0.3]) enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(ang+s)*bsp*0.85,vy:Math.sin(ang+s)*bsp*0.85,r:3*sc2,col:e.color,life:1});
      }
      if(e.type==='charger'&&!e.chargeActive){
        for(let i=0;i<6;i++){let a=(i/6)*Math.PI*2; enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*bsp*0.6,vy:Math.sin(a)*bsp*0.6,r:3*sc2,col:e.color,life:1});}
      }
    }
    for(let b of bullets){
      if(!b._dead&&dist(b,e)<e.r+b.r){
        if(!b.piercing) b._dead=true; shotsHit++;
        e.hp--; spawnParticles(b.x,b.y,e.color,5,2); sfx('hit');
        if(e.hp<=0) killEnemy(e,b.x,b.y);
      }
    }
    bullets=bullets.filter(b=>!b._dead);
    if(player.invincible<=0&&dist(player,e)<player.r+e.r*0.85){ hitPlayer(); e.dead=true; spawnParticles(e.x,e.y,e.color,10,3); }
    if(e.y>H+30) e.dead=true;
  }
  enemies=enemies.filter(e=>!e.dead);
  for(let a of asteroids){
    a.x+=a.vx*dt; a.y+=a.vy*dt; a.angle+=a.spin*dt; a.life-=0.003*dt;
    if(player.invincible<=0&&dist(player,a)<player.r+a.r*0.8){hitPlayer();a.life=0;}
    for(let b of bullets){if(!b._dead&&dist(b,a)<b.r+a.r){b._dead=true;a.life-=0.4;spawnParticles(a.x,a.y,'#888',4,2);}}
    bullets=bullets.filter(b=>!b._dead);
  }
  asteroids=asteroids.filter(a=>a.life>0&&a.y<H+60&&a.x>-60&&a.x<W+60);
  for(let lw of laserWalls){
    lw.timer-=dt;
    if(lw.active&&player.invincible<=0) if(Math.abs(player.y-lw.y)<player.r+6) hitPlayer();
  }
  laserWalls=laserWalls.filter(lw=>lw.timer>0);
  for(let b of enemyBullets){b.x+=b.vx*bulletTimeScale*dt;b.y+=b.vy*bulletTimeScale*dt;}
  enemyBullets=enemyBullets.filter(b=>b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20&&b.life>0);
  for(let b of enemyBullets){
    let d=dist(player,b);
    if(d<player.r*2.5&&bulletTimeScale===1&&player.invincible<=0){
      bulletTimeScale=0.35; bulletTimeTimer=18;
      flashScreen('rgba(45,255,207,0.06)');
    }
    if(player.invincible<=0&&dist(player,b)<player.r*0.82+b.r){ hitPlayer(); b.life=0; spawnParticles(b.x,b.y,b.col,6,2); }
  }
  enemyBullets=enemyBullets.filter(b=>b.life>0);
  if(bossActive&&boss&&!boss.dead){
    boss.t+=0.015*dt;
    boss.x+=boss.vx*bulletTimeScale*dt;
    boss.y=H*0.14+Math.sin(boss.t*1.5)*H*0.06;
    if(boss.x<boss.r||boss.x>W-boss.r) boss.vx*=-1;
    boss.weakAngle+=0.025*dt;
    let weakAbsX=boss.x+Math.cos(boss.weakAngle)*boss.r*0.6;
    let weakAbsY=boss.y+Math.sin(boss.weakAngle)*boss.r*0.3;
    updateBossPhase();
    boss.shootCd-=dt;
    if(boss.shootCd<=0){
      boss.shootCd=boss.shootRate/Math.max(1,bulletTimeScale);
      let bsp=3.5*sc2;
      let fc=5+boss.phase*2, spr=Math.PI/2;
      for(let i=0;i<fc;i++){let ang=Math.PI/2+(-spr/2)+(spr/(fc-1))*i; enemyBullets.push({x:boss.x,y:boss.y+boss.r,vx:Math.cos(ang)*bsp,vy:Math.sin(ang)*bsp,r:5*sc2,col:'#ff2d78',life:1});}
      if(boss.phase>=1){
        let ang=Math.atan2(player.y-boss.y,player.x-boss.x);
        enemyBullets.push({x:boss.x,y:boss.y,vx:Math.cos(ang)*bsp*1.6,vy:Math.sin(ang)*bsp*1.6,r:6*sc2,col:'#ff9f1c',life:1});
        if(Math.random()<0.2) asteroids.push({x:Math.random()*W,y:-30,vx:(Math.random()-0.5)*3*sc2,vy:2*sc2+Math.random()*2*sc2,r:12*sc2,angle:0,spin:(Math.random()-0.5)*0.1,life:1});
      }
      if(boss.phase>=2){
        for(let i=0;i<8;i++){let ang=(i/8)*Math.PI*2+boss.t; enemyBullets.push({x:boss.x,y:boss.y,vx:Math.cos(ang)*bsp*0.8,vy:Math.sin(ang)*bsp*0.8,r:4*sc2,col:'#a78bfa',life:1});}
        if(Math.random()<0.02) laserWalls.push({y:H*0.3+Math.random()*H*0.4,active:false,timer:120,chargeTimer:40});
      }
    }
    for(let lw of laserWalls){lw.chargeTimer-=dt;if(lw.chargeTimer<=0) lw.active=true;}
    for(let b of bullets){
      if(!b._dead){
        let weakPt={x:weakAbsX,y:weakAbsY,r:boss.r*0.22};
        if(dist(b,weakPt)<b.r+weakPt.r){ b._dead=true; boss.hp-=3; shotsHit++; spawnParticles(weakAbsX,weakAbsY,'#fff544',8,3); spawnPop(weakAbsX,weakAbsY,'WEAK x3','#fff544'); sfx('hit'); }
        else if(dist(b,boss)<boss.r+b.r){ b._dead=true; boss.hp--; shotsHit++; spawnParticles(b.x,b.y,boss.color,4,2); sfx('hit'); }
      }
    }
    bullets=bullets.filter(b=>!b._dead);
    bossFill.style.width=Math.max(0,(boss.hp/boss.maxHp)*100)+'%';
    if(boss.hp<=0){
      boss.dead=true; doScreenShake(25,40); flashScreen('rgba(255,159,28,0.2)');
      let pts=Math.round(200*combo*(inZone?2:1)); score+=pts; scoreValEl.textContent=score;
      spawnParticles(boss.x,boss.y,'#ff9f1c',50,6); spawnParticles(boss.x,boss.y,'#ff2d78',35,5); spawnParticles(boss.x,boss.y,'#2dffcf',25,7);
      spawnPop(boss.x-30,boss.y,pts,'#ff9f1c'); sfx('explode');
      if(!boss.splitDone){ boss.splitDone=true;
        for(let i=0;i<3;i++){let col=COLORS[Math.floor(Math.random()*COLORS.length)]; enemies.push({x:boss.x+(i-1)*60*sc2,y:boss.y,r:boss.r*0.45,hp:3,maxHp:3,speed:1.8*(H/600),type:'zigzag',t:Math.random()*10,color:col,side:i-1||1,shootCd:30,shootRate:45,dead:false,spawnX:boss.x+(i-1)*60*sc2,elite:false,hasSplit:true,chargeVx:0,chargeVy:0,chargeActive:false,chargeCd:999});}
      }
      bossActive=false; bossWrap.classList.remove('show');
    }
    if(player.invincible<=0&&dist(player,boss)<player.r+boss.r*0.88) hitPlayer();
  }
  for(let p of powerups){
    p.y+=0.8*dt; p.pulse+=0.08*dt;
    if(dist(player,p)<player.r+p.r*1.2){activatePowerup(p.type);p.collected=true;spawnParticles(p.x,p.y,p.color,12,3);}
  }
  powerups=powerups.filter(p=>!p.collected&&p.y<H+40);
  for(let p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=0.028*dt;p.vx*=0.96;p.vy*=0.96;}
  particles=particles.filter(p=>p.life>0);
  let endlessWin=gameMode==='endless'?false:wave>=10;
  if(enemies.length===0&&!bossActive&&state===SC.PLAYING){
    waveTimer-=dt;
    if(waveTimer<=0){
      waveTimer=90;
      if(endlessWin){state=SC.WIN;showEnd(true);}
      else showScorecard();
    }
  }
}

function killEnemy(e,bx,by){
  if(e.dead) return;
  e.dead=true;
  waveKills++;totalKills++;upgradeKills++;
  save.totalKillsAll++;
  let pts=Math.round(10*(e.elite?5:1)*combo*(inZone?2:1));
  score+=pts; scoreValEl.textContent=score;
  combo=Math.min(combo+1,12); comboTimer=150;
  comboBar.classList.remove('hidden'); comboTxt.textContent='COMBO x'+combo;
  if(combo>=10) checkAch('combo10');
  let sn=STREAK_NAMES[Math.min(combo,STREAK_NAMES.length-1)]||'';
  if(sn&&combo>=4){streakTxt.textContent=sn;streakTxt.style.color=COLORS[combo%COLORS.length];streakTxt.style.opacity='1';}
  else streakTxt.style.opacity='0';
  spawnParticles(e.x,e.y,e.color,e.elite?22:14,e.elite?5:3.5);
  spawnPop(bx-20,by,pts,e.color);
  doScreenShake(e.elite?10:4,e.elite?12:6);
  sfx('explode');
  if(e.type==='splitter'&&!e.hasSplit&&e.r>Math.min(W,H)*0.009){
    for(let i=0;i<2;i++){
      let sc2=W/680;
      enemies.push({x:e.x+(i?1:-1)*e.r*1.2,y:e.y,r:e.r*0.55,hp:1,maxHp:1,speed:e.speed*1.3,type:'splitter',t:rng()*10,color:e.color,side:i?1:-1,shootCd:30,shootRate:e.shootRate*1.3,dead:false,spawnX:e.x,elite:false,hasSplit:true,chargeVx:0,chargeVy:0,chargeActive:false,chargeCd:999});
    }
  }
  let dropChance=e.elite?1.0:0.12+(wave*0.01);
  if(Math.random()<dropChance){
    let type=e.elite?PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)]:PU_TYPES[Math.floor(Math.random()*(PU_TYPES.length-1))];
    let cols={shield:'#60d9ff',rapid:'#ff9f1c',bomb:'#ff6bff',laser:'#2dffcf',missile:'#a78bfa',life:'#ff2d78'};
    powerups.push({x:e.x,y:e.y,r:10*(W/680),type,color:cols[type]||'#fff',pulse:0,collected:false});
  }
  updateUpgradeBar();
  if(upgradeKills>=upgradeThreshold){upgradeKills=0;applyUpgrade();}
  if(totalKills===1) checkAch('first_blood');
  if(save.totalKillsAll>=100) checkAch('kills100');
  if(save.totalKillsAll>=500) checkAch('kills500');
  writeSave();
}

function hitPlayer(){
  waveNoHit=false;
  if(shieldHp>0){shieldHp--;updateShieldBar();player.invincible=60;player.flash=60;spawnParticles(player.x,player.y,'#60d9ff',8,2);doScreenShake(5,8);sfx('hit');return;}
  lives--;
  player.invincible=140;player.flash=140;
  spawnParticles(player.x,player.y,'#fff',14,3);spawnParticles(player.x,player.y,'#ff2d78',8,2);
  combo=1;comboTimer=0;comboBar.classList.add('hidden');
  livesValEl.textContent=Math.max(0,lives);
  doScreenShake(16,20); flashScreen('rgba(255,45,120,0.18)'); sfx('damage');
  if(lives<=0){
    if(!lastStandActive){
      lastStandActive=true;lastStandTimer=180;
      lastStandEl.classList.add('show'); setTimeout(()=>lastStandEl.classList.remove('show'),600);
      player.invincible=180;
      for(let a=0;a<Math.PI*2;a+=Math.PI/8) bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*14*(W/680),vy:Math.sin(a)*14*(W/680),r:6*(W/680),color:'#ff2d78',piercing:true,_dead:false});
      player.rapidTimer=180; doScreenShake(30,50);
      showPuNotify('LAST STAND','One final burst!','#ff2d78');
    }
  }
}

function showScorecard(){
  state=SC.SCORECARD;
  let acc=shotsFired>0?Math.round(shotsHit/shotsFired*100):0;
  let waveBonus=Math.round(waveKills*5);
  score+=waveBonus; scoreValEl.textContent=score;
  if(waveNoHit) checkAch('nodamage');
  let opts = [
  {
    cls:'danger',
    icon:'<span class="icon-red">!!</span>',
    name:'BULLET STORM',
    desc:'Enemy fire rate +50%',
    reward:'SCORE x1.5 next wave',
    mod:()=>{diffMod.bulletSpeed=1.5;diffMod.reward='Score x1.5';}
  },
  {
    cls:'warn',
    icon:'<span class="icon-yellow">+</span>',
    name:'ELITE SURGE',
    desc:'More elite enemies',
    reward:'Guaranteed power-up drop',
    mod:()=>{diffMod.enemyCount=1.3;diffMod.reward='Elite wave';}
  },
  {
    cls:'cyan',
    icon:'<span class="icon-cyan">!</span>',
    name:'BOSS RUSH',
    desc:'Next boss has +50% HP',
    reward:'Unlock upgrade faster',
    mod:()=>{diffMod.bossHp=1.5;diffMod.reward='Fast upgrade';}
  },
];
  document.getElementById('sc-content').innerHTML=`
    <div class="sc-row"><span class="sc-lbl">Kills this wave</span><span class="sc-val">${waveKills}</span></div>
    <div class="sc-row"><span class="sc-lbl">Accuracy</span><span class="sc-val">${acc}%</span></div>
    <div class="sc-row"><span class="sc-lbl">Wave bonus</span><span class="sc-bonus">+${waveBonus}</span></div>
    <div class="sc-row"><span class="sc-lbl">Total kills</span><span class="sc-val">${totalKills}</span></div>
    ${gameMode==='endless'?`<div class="sc-row"><span class="sc-lbl">Wave</span><span class="sc-val">∞ ${wave}</span></div>`:''}
  `;
  document.getElementById('sc-diff-cards').innerHTML=opts.map(o=>`
    <div class="diff-card ${o.cls}">
      <div class="diff-card-icon">${o.icon}</div>
      <div class="diff-card-name">${o.name}</div>
      <div class="diff-card-desc">${o.desc}</div>
      <div class="diff-card-reward">${o.reward}</div>
    </div>`).join('');
  document.querySelectorAll('.diff-card').forEach((el,i)=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('.diff-card').forEach(c=>{c.style.pointerEvents='none';c.style.opacity='0.4';});
      diffMod={bulletSpeed:1,enemyCount:1,bossHp:1,reward:''};
      opts[i].mod();
      scorecard.classList.remove('show');
      setTimeout(()=>{ spawnZones(); state=SC.PLAYING; spawnWave(); startLoop(); },320);
    });
  });
  scorecard.classList.add('show');
}

function showEnd(win){
  if(win||state===SC.DEAD){
    if(gameMode==='classic'&&score>save.highScore){save.highScore=score;}
    if(gameMode==='endless'&&score>save.endlessHigh){save.endlessHigh=score;}
    if(gameMode==='daily'){save.dailyDate=getDailyDate();save.dailyScore=score;save.dailyDone=true;checkAch('daily');}
    writeSave();
  }
  overlay.classList.remove('hidden');
  let modeLabel=gameMode==='endless'?'ENDLESS':'';
  overlay.innerHTML=win
    ?`<div class="ov-title">YOU WIN</div><div class="ov-sub">ALL 10 WAVES CLEARED</div><br><br><br><br><br><br><div class="ov-score-lbl">FINAL SCORE</div><div class="ov-score cyan">${score.toLocaleString()}</div><div class="ov-detail">HIGH: ${save.highScore.toLocaleString()} &nbsp;|&nbsp; KILLS: ${totalKills}</div><div class="btn-row"><button class="btn cyan" id="retry-btn">PLAY AGAIN</button><button class="btn sm" id="menu-btn" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);">MENU</button></div>`
    :`<div class="ov-title">GAME OVER</div><div class="ov-sub">${modeLabel} WAVE ${wave}</div><br><br><br><br><br><br><div class="ov-score-lbl">SCORE</div><div class="ov-score red">${score.toLocaleString()}</div><div class="ov-detail">BEST: ${(gameMode==='endless'?save.endlessHigh:save.highScore).toLocaleString()} &nbsp;|&nbsp; KILLS: ${totalKills}</div><div class="btn-row"><button class="btn primary" id="retry-btn">RETRY</button><button class="btn sm" id="menu-btn" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);">MENU</button></div>`;
  document.getElementById('retry-btn').addEventListener('click',()=>{
    overlay.classList.add('hidden'); scorecard.classList.remove('show');
    rng=Math.random;
    if(gameMode==='daily'){ dailyRng=mulberry32(dateToSeed(getDailyDate())); rng=dailyRng; }
    state=SC.PLAYING; initGame(); startLoop();
  });
  document.getElementById('menu-btn').addEventListener('click',()=>{
    overlay.innerHTML='<div class="ov-title">NEON VOID</div><div class="ov-sub">SURVIVE THE SWARM</div><div id="main-menu-content"></div>';
    showMainMenu();
  });
}

function hexPath(x,y,r,sides,rot){ ctx.beginPath(); for(let i=0;i<sides;i++){let a=(i/sides)*Math.PI*2+(rot||0); i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);} ctx.closePath(); }

function draw(){
  ctx.save();
  ctx.translate(shakeX,shakeY);
  for(let f of screenFlashes){
    ctx.globalAlpha=f.life; ctx.fillStyle=f.col; ctx.fillRect(-5,-5,W+10,H+10); ctx.globalAlpha=1;
  }
  ctx.fillStyle='#02020f'; ctx.fillRect(-5,-5,W+10,H+10);
  ctx.strokeStyle='rgba(45,255,207,0.022)'; ctx.lineWidth=1;
  let gs=Math.round(H/18);
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  let now=Date.now()*0.001;
  for(let s of bgStars){
    s.y+=s.sp*0.002; if(s.y>1){s.y=0;s.x=Math.random();}
    let tw=0.35+0.35*Math.sin(s.tw+now*1.4);
    ctx.fillStyle=`rgba(255,255,255,${tw*s.s*0.45})`; ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.s*(W/680)*0.9,0,Math.PI*2); ctx.fill();
  }
  let ng=ctx.createRadialGradient(W*0.2,H*0.3,0,W*0.2,H*0.3,W*0.35);
  ng.addColorStop(0,'rgba(100,45,180,0.055)'); ng.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);
  let ng2=ctx.createRadialGradient(W*0.8,H*0.7,0,W*0.8,H*0.7,W*0.3);
  ng2.addColorStop(0,'rgba(45,100,255,0.045)'); ng2.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=ng2; ctx.fillRect(0,0,W,H);
  for(let z of multiplierZones){
    ctx.save(); ctx.globalAlpha=0.08+0.04*Math.sin(z.pulse); ctx.fillStyle='#fff544';
    ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.18+0.08*Math.sin(z.pulse); ctx.strokeStyle='#fff544'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.1; ctx.fillStyle='#fff544';
    ctx.font='bold '+(11*(W/680))+'px Orbitron,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('2x',z.x,z.y); ctx.restore();
  }
  for(let lw of laserWalls){
    ctx.save();
    if(!lw.active){ctx.globalAlpha=0.3+0.3*Math.sin(Date.now()*0.02);ctx.strokeStyle='#ff9f1c';ctx.lineWidth=2;ctx.setLineDash([10,8]);ctx.beginPath();ctx.moveTo(0,lw.y);ctx.lineTo(W,lw.y);ctx.stroke();ctx.setLineDash([]);}
    else{ctx.globalAlpha=0.7;ctx.strokeStyle='#ff2d78';ctx.lineWidth=8;ctx.shadowColor='#ff2d78';ctx.shadowBlur=20;ctx.beginPath();ctx.moveTo(0,lw.y);ctx.lineTo(W,lw.y);ctx.stroke();}
    ctx.restore();
  }
  for(let a of asteroids){
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
    ctx.fillStyle='#888';ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.shadowColor='#666';ctx.shadowBlur=6;
    ctx.beginPath(); for(let i=0;i<7;i++){let angle=(i/7)*Math.PI*2;let jr=0.7+Math.sin(i*7.3)*0.3;let px=Math.cos(angle)*a.r*jr,py=Math.sin(angle)*a.r*jr;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  }
  for(let b of enemyBullets){ ctx.save();ctx.shadowColor=b.col;ctx.shadowBlur=10;ctx.fillStyle=b.col;ctx.globalAlpha=0.88;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.restore(); }
  for(let p of particles){ ctx.save();ctx.globalAlpha=p.life*0.9;ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore(); }
  for(let t of player.trail){ if(t.life<=0) continue; ctx.save();ctx.globalAlpha=t.life*0.3;let ship=SHIPS[save.selectedShip];ctx.fillStyle=ship?ship.color:'#2dffcf';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=5;ctx.beginPath();ctx.arc(t.x,t.y,player.r*t.life*0.45,0,Math.PI*2);ctx.fill();ctx.restore(); }
  for(let p of powerups){
    ctx.save(); let pr2=0.8+0.2*Math.sin(p.pulse);
    ctx.shadowColor=p.color;ctx.shadowBlur=16*pr2;ctx.fillStyle=p.color;ctx.globalAlpha=0.9;ctx.beginPath();ctx.arc(p.x,p.y,p.r*pr2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(p.x,p.y,p.r*0.45,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.6*pr2,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  for(let b of bullets){
    ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=16;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    if(b.missile){ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(b.x-(b.vx||0)*2,b.y-b.vy*1.5,b.r*0.5,0,Math.PI*2);ctx.fill();}ctx.restore();
  }
  if(laserActive){
    ctx.save();ctx.shadowColor='#2dffcf';ctx.shadowBlur=30;let flicker=0.7+0.3*Math.sin(Date.now()*0.05);
    ctx.strokeStyle='rgba(45,255,207,'+flicker+')';ctx.lineWidth=6*(W/680);ctx.beginPath();ctx.moveTo(player.x,player.y-player.r);ctx.lineTo(player.x,0);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2*(W/680);ctx.beginPath();ctx.moveTo(player.x,player.y-player.r);ctx.lineTo(player.x,0);ctx.stroke();ctx.restore();
  }
  for(let e of enemies){
    if(e.dead) continue;
    ctx.save();
    ctx.shadowColor=e.color;ctx.shadowBlur=e.elite?28:18;ctx.fillStyle=e.color;ctx.globalAlpha=0.92;
    if(e.type==='charger'){
      ctx.beginPath();ctx.moveTo(e.x,e.y-e.r*1.3);ctx.lineTo(e.x+e.r*1.1,e.y);ctx.lineTo(e.x,e.y+e.r*1.3);ctx.lineTo(e.x-e.r*1.1,e.y);ctx.closePath();ctx.fill();
      if(e.chargeActive){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.globalAlpha=0.6;ctx.stroke();}
    } else {
      hexPath(e.x,e.y,e.r,e.mini?8:6,e.t*0.5);ctx.fill();
    }
    if(e.elite){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.globalAlpha=0.5;ctx.stroke();ctx.globalAlpha=0.5;ctx.fillStyle='#ffd700';hexPath(e.x,e.y,e.r*0.5,4,e.t*-0.9);ctx.fill();}
    else{ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.globalAlpha=0.25;ctx.stroke();ctx.globalAlpha=0.35;ctx.fillStyle='#fff';hexPath(e.x,e.y,e.r*0.4,4,e.t*-0.8);ctx.fill();}
    if(e.maxHp>1){let bw=e.r*2.4;ctx.globalAlpha=0.6;ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(e.x-bw/2,e.y+e.r+4,bw,3);ctx.fillStyle=e.color;ctx.fillRect(e.x-bw/2,e.y+e.r+4,bw*(e.hp/e.maxHp),3);}
    ctx.restore();
  }
  if(bossActive&&boss&&!boss.dead){
    let pulse=0.85+0.15*Math.sin(Date.now()*0.004);let phaseColors=['#ff2d78','#ff6bff','#ff9f1c'];let bc=phaseColors[boss.phase];
    ctx.save();ctx.shadowColor=bc;ctx.shadowBlur=40*pulse;
    ctx.strokeStyle='rgba(255,45,120,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(boss.x,boss.y,boss.r*1.55,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(boss.x,boss.y,boss.r*1.22,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=28*pulse;ctx.fillStyle=bc;ctx.globalAlpha=0.95;hexPath(boss.x,boss.y,boss.r,8,boss.t*0.3);ctx.fill();
    ctx.strokeStyle='#ff9f1c';ctx.lineWidth=2;ctx.globalAlpha=0.55;hexPath(boss.x,boss.y,boss.r*0.65,6,-boss.t*0.8);ctx.stroke();
    ctx.fillStyle='#fff544';ctx.globalAlpha=0.3;hexPath(boss.x,boss.y,boss.r*0.35,4,boss.t*1.5);ctx.fill();
    let weakAbsX=boss.x+Math.cos(boss.weakAngle)*boss.r*0.6,weakAbsY=boss.y+Math.sin(boss.weakAngle)*boss.r*0.3;
    ctx.globalAlpha=0.8+0.2*Math.sin(Date.now()*0.01);ctx.fillStyle='#fff544';ctx.shadowColor='#fff544';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(weakAbsX,weakAbsY,boss.r*0.14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(weakAbsX,weakAbsY,boss.r*0.22,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.8;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(boss.x,boss.y,boss.r*0.1,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  if(weapons.orbit){ for(let o of orbitShields){ if(!o.x) continue; ctx.save();ctx.shadowColor='#2dffcf';ctx.shadowBlur=14;ctx.fillStyle='#2dffcf';ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(o.x,o.y,player.r*0.52,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(o.x,o.y,player.r*0.7,0,Math.PI*2);ctx.stroke();ctx.restore(); } }
  if(state===SC.PLAYING||lastStandActive){
    let flashOn=player.flash<=0||Math.floor(player.flash/6)%2===0;
    if(flashOn){
      ctx.save();
      let ship=SHIPS[save.selectedShip]||SHIPS.viper;
      let shipColor=lastStandActive?'#ff2d78':ship.color;
      ctx.shadowColor=shipColor;ctx.shadowBlur=lastStandActive?40:24;ctx.fillStyle=shipColor;ctx.globalAlpha=0.95;
      ship.draw(ctx,player.x,player.y,player.r);ctx.fill();
      ctx.shadowBlur=8;ctx.fillStyle='#fff';ctx.globalAlpha=0.55;ctx.beginPath();ctx.ellipse(player.x,player.y-player.r*0.4,player.r*0.27,player.r*0.41,0,0,Math.PI*2);ctx.fill();
      let engColor=lastStandActive?'#fff544':'#ff9f1c';
      ctx.fillStyle=engColor;ctx.globalAlpha=0.85;ctx.shadowColor=engColor;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(player.x,player.y+player.r*0.75,player.r*0.34,0,Math.PI*2);ctx.fill();
      let tLen=4+Math.random()*6;
      for(let i=0;i<tLen;i++){let ty=player.y+player.r*0.75+(i+1)*player.r*0.38;ctx.globalAlpha=0.5*(1-i/tLen);ctx.fillStyle=lastStandActive?'#ff9f1c':'#ff2d78';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(player.x,ty,player.r*0.18*(1-i/tLen),0,Math.PI*2);ctx.fill();}
      if(shieldHp>0){ctx.strokeStyle='#60d9ff';ctx.lineWidth=2;ctx.globalAlpha=0.5+0.2*Math.sin(Date.now()*0.01);ctx.shadowColor='#60d9ff';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(player.x,player.y,player.r*2.0,0,Math.PI*2);ctx.stroke();}
      ctx.restore();
    }
    if(targetX!==null){
      ctx.save();ctx.strokeStyle='rgba(45,255,207,0.35)';ctx.lineWidth=1;let cs=11;
      ctx.beginPath();ctx.moveTo(targetX-cs,targetY);ctx.lineTo(targetX+cs,targetY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(targetX,targetY-cs);ctx.lineTo(targetX,targetY+cs);ctx.stroke();
      ctx.beginPath();ctx.arc(targetX,targetY,5,0,Math.PI*2);ctx.stroke();ctx.restore();
    }
  }
  ctx.restore();
}
</script>
</body>
