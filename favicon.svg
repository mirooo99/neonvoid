<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#02020f"/>
  <!-- hex enemy top-left -->
  <polygon points="8,4 12,6.3 12,10.7 8,13 4,10.7 4,6.3" fill="#ff2d78"/>
  <!-- hex enemy top-right -->
  <polygon points="24,4 28,6.3 28,10.7 24,13 20,10.7 20,6.3" fill="#a78bfa"/>
  <!-- ship body -->
  <polygon points="16,14 11,24 13.5,22 16,25 18.5,22 21,24" fill="#2dffcf"/>
  <!-- cockpit -->
  <ellipse cx="16" cy="17.5" rx="2.2" ry="3" fill="white" fill-opacity="0.6"/>
  <!-- engine glow -->
  <ellipse cx="16" cy="26.5" rx="1.8" ry="2.5" fill="#ff9f1c"/>
  <!-- bullet -->
  <line x1="16" y1="12" x2="16" y2="6" stroke="#2dffcf" stroke-width="1.5" stroke-linecap="round"/>
</svg>
